baseURL: "https://jurij-jukic.github.io/"
locale: "en-us"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
disableKinds:
  - taxonomy
  - term

minify:
  disableXML: true
  minifyOutput: true

pagination:
  pagerSize: 10

outputs:
  home:
    - HTML
    - RSS

params:
  env: production
  description: "Personal website and research notes by Jurij Jukić."
  author: "Jurij Jukić"
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  mainSections:
    - posts

  homeInfoParams:
    Title: "Jurij Jukić"
    Image: "/images/IMG_0203-bw-flipped.jpg"
    LightImage: "/images/IMG_0203-bw-negative-flipped.jpg"
    ImageOffsetX: "0%"
    ImageOffsetY: "0%"
    ImageScale: "0.9"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
